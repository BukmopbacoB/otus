[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "cms-vm"
  omit_hostname = false

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "telegraf"
  timeout = "5s"

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = true

[[inputs.mem]]
[[inputs.swap]]
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "overlay"]
[[inputs.diskio]]
[[inputs.system]]
[[inputs.net]]
[[inputs.processes]]
[[inputs.kernel]]
[[inputs.kernel_vmstat]]

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_names = []
  timeout = "5s"
  perdevice = true
  total = false

[[inputs.nginx]]
  urls = ["http://nginx/nginx_status"]
  response_timeout = "5s"

[[inputs.phpfpm]]
  urls = ["http://php:9000/status"]
  # если сделаете status через nginx, лучше так:
  # urls = ["http://nginx/fpm-status"]

[[inputs.postgresql]]
  address = "host=db port=5432 user=telegraf password=telegraf_pass dbname=postgres sslmode=disable"
  ignored_databases = ["template0", "template1"]
  prepared_statements = true

[[inputs.net_response]]
  protocol = "tcp"
  address = "nginx:80"
  timeout = "3s"

[[inputs.net_response]]
  protocol = "tcp"
  address = "db:5432"
  timeout = "3s"

[[inputs.http_response]]
  urls = ["http://nginx/"]
  method = "GET"
  response_timeout = "5s"
  follow_redirects = true

[[inputs.http_response]]
  urls = ["http://nginx/non-existing-page"]
  method = "GET"
  response_timeout = "5s"
  follow_redirects = false
  response_string_match = "404"
