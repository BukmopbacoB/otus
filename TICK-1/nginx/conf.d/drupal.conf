server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass cms-php:9000;
    }

    # Метрики stub_status для nginx exporter
    location /stub_status {
        stub_status;
        access_log off;
        allow all; # в учебных целях, в бою лучше ограничить сетью
    }

    # Чтобы Telegraf тоже видел (обращается по /nginx_status)
    location /nginx_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
    }

    # PHP-FPM status для Telegraf
    location /fpm-status {
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass cms-php:9000;
    }
}
