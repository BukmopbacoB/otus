services:
  nginx:
    image: nginx:1.25-alpine
    container_name: cms-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./src:/var/www/html
    depends_on:
      - php
    networks:
      - cms-net

  php:
    build:
      context: ./php
    container_name: cms-php
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    networks:
      - cms-net

  db:
    image: postgres:16
    container_name: cms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    networks:
      - cms-net

  #################################################
  # TICK-1 stack
  #################################################

  influxdb:
    image: influxdb:1.8
    container_name: tick-influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./TICK-1/influxdb:/var/lib/influxdb
    networks:
      - cms-net

  chronograf:
    image: chronograf:1.10
    container_name: tick-chronograf
    ports:
      - "8888:8888"
    environment:
      INFLUXDB_URL: http://influxdb:8086
      KAPACITOR_URL: http://kapacitor:9092
    depends_on:
      - influxdb
      - kapacitor
    volumes:
      - ./TICK-1/chronograf:/var/lib/chronograf
    networks:
      - cms-net

  kapacitor:
    image: kapacitor:1.6
    container_name: tick-kapacitor
    ports:
      - "9092:9092"
    environment:
      KAPACITOR_INFLUXDB_0_URLS_0: http://influxdb:8086
      KAPACITOR_INFLUXDB_0_ENABLED: "true"
      KAPACITOR_INFLUXDB_0_DEFAULT: "true"
      KAPACITOR_INFLUXDB_0_NAME: influxdb
    depends_on:
      - influxdb
    volumes:
      - ./TICK-1/kapacitor:/var/lib/kapacitor
      - ./TICK-1/kapacitor/kapacitor.conf:/etc/kapacitor/kapacitor.conf:ro
      - ./TICK-1/kapacitor/tasks:/etc/kapacitor/load:ro
    networks:
      - cms-net

  telegraf:
    image: telegraf:1.30
    container_name: tick-telegraf
    depends_on:
      - influxdb
      - nginx
      - php
      - db
    user: root
    volumes:
      - ./TICK-1/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/hostfs:ro
    environment:
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
      HOST_ETC: /hostfs/etc
    networks:
      - cms-net

networks:
  cms-net:

volumes:
  pgdata:
