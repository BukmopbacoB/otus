services:
  nginx:
    image: nginx:1.25-alpine
    container_name: cms-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./src:/var/www/html
    depends_on:
      - php
    networks:
      - cms-net

  php:
    build:
      context: ./php
    container_name: cms-php
    # БЕЗ user:, всё под root внутри контейнера
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    networks:
      - cms-net

  db:
    image: postgres:16
    container_name: cms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    networks:
      - cms-net

  #################################################
  # Zabbix stack
  #################################################

  zabbix-db:
    image: postgres:16
    container_name: zabbix-postgres
    environment:
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_pwd
    volumes:
      - zbx_pgdata:/var/lib/postgresql/data
    networks:
      - cms-net

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: zabbix-server
    environment:
      DB_SERVER_HOST: zabbix-postgres
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_pwd
      POSTGRES_DB: zabbix
      ZBX_TIMEOUT: 10
    depends_on:
      - zabbix-db
    ports:
      - "10051:10051"
    networks:
      - cms-net

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: zabbix-web
    environment:
      DB_SERVER_HOST: zabbix-postgres
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix_pwd
      POSTGRES_DB: zabbix
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: Europe/Moscow
    depends_on:
      - zabbix-db
      - zabbix-server
    ports:
      - "8082:8080"
    networks:
      - cms-net

  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    container_name: zabbix-agent
    hostname: docker-host
    environment:
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      ZBX_HOSTNAME: docker-host
    volumes:
      - ./zabbix/postgresql.conf:/etc/zabbix/zabbix_agentd.d/postgresql.conf:ro
    ports:
      - "10050:10050"
    networks:
      - cms-net


networks:
  cms-net:

volumes:
  pgdata:
  zbx_pgdata:
